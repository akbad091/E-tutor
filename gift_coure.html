<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Tutor</title>

    <!-- EXTERNAL RESOURCES -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />

    <!-- CUSTOM STYLES -->
    <style type="text/tailwindcss">
        @theme {
            /* ========== COLORS ========== */
            --color-gray: #8C94A3;
            --color-neutral-white: #f6f6f6;
            --color-neutral-black: #5C5F6A;
            --color-gray-dark: #1D2026;

            /* ========== FONTS ========== */
            --font-inter: "Inter", sans-serif;

            /* ========== TEXT SIZES ========== */
            --text-xxs: 10px;
            --text-xxs-line-height: 12px;
            --text-xs: 12px;
            --text-xs-line-height: 24px;
            --text-sm: 14px;
            --text-sm-line-height: 20px;
            --text-base: 16px;
            --text-base-line-height: 22px;
            --text-xl: 18px;
            --text-xl-line-height: 24px;
            --text-1xl: 20px;
            --text-1xl-line-height: 32px;
            --text-2xl: 24px;
            --text-2xl-line-height: 32px;
            --text-3xl: 32px;
            --text-3xl-line-height: 40px;
            --text-4xl: 40px;
            --text-4xl-line-height: 48px;
            --text-5xl: 48px;
            --text-5xl-line-height: 52px;
            --text-7xl: 72px;
            --text-7xl-line-height: 74px;
            --text-8xl: 80px;
            --text-8xl-line-height: 80px;
        }

        /* Navigation styling */
        nav {
            @apply text-sm leading-[20px] text-gray flex gap-[24px];
        }
        h2 {
            @apply text-4xl leading-[48px] font-semibold text-center tracking-[1%];
        }
    </style>
</head>

<body class="font-inter">
    <!-- ============================================
                    NAVIGATION BAR
         ============================================ -->
    <div class="bg-[#1D2026] flex items-center justify-between px-[32px] py-[16px]">
        <!-- Main Navigation Links -->
        <nav>
            <a href="index.html" class="text-white border-t-2 border-orange-500">Home</a>
            <a href="category.html">Courses</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="instructor.html">Become an Instructor</a>
        </nav>

        <!-- Currency & Language Selectors -->
        <div class="flex gap-[24px] text-gray text-sm leading-[22px]">
            <a href="#" class="flex flex-row items-center gap-[6px]">USD <span><svg class="w-4 h-4" fill="none"
                        stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg></span></a>
            <a href="#" class="flex flex-row items-center gap-[6px]">English <span><svg class="w-4 h-4" fill="none"
                        stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg></span></a>
        </div>
    </div>

    <!-- ============================================
                    HEADER / TOP BAR
         ============================================ -->
    <header class="flex items-center justify-between px-[32px] py-[24px]">
        <!-- Logo, Browse Button & Search Bar -->
        <div class="flex">
            <img src="./Images/LOGO.svg" alt="logo">

            <!-- Browse Dropdown -->
            <div class="ml-[50px] mr-[16px]">
                <button
                    class="flex items-center justify-between gap-2 border border-gray-300 w-[200px] h-[48px] px-[16px] rounded-md text-gray-700 hover:bg-gray-50">
                    Browse
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
            </div>

            <!-- Search Input -->
            <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <img src="./images/MagnifyingGlass.svg" alt="Search icon" class="w-5 h-5 text-gray-500" />
                </div>
                <input type="text" placeholder="What do you want learn..."
                    class="w-full pl-10 pr-[177px] py-[12px] border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
            </div>
        </div>

        <!-- User Actions & Buttons -->
        <div class="flex items-center gap-6">
            <!-- Icons (Notifications, Wishlist, Cart) -->
            <div class="flex items-center gap-4 text-gray-600">
                <img src="./Images/Bell.svg" alt="Notifications">
                <img src="./Images/Heart.svg" alt="Wishlist">
                <img src="./Images/ShoppingCartSimple.svg" alt="Shopping Cart">
            </div>

            <!-- Auth Buttons -->
            <div class="flex items-center gap-3">
                <button class="px-[24px] py-[12px] font-semibold bg-orange-100 text-orange-600 hover:bg-orange-200">
                    Create Account
                </button>
                <button class="px-[24px] py-[12px] font-semibold bg-orange-500 text-white hover:bg-orange-600">
                    Sign In
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="text-center bg-[#F5F7FA] text-[#1D2026] py-[40px] px-[300px] space-y-[16px]">
            <h4 class="text-2xl leading-[32px] font-semibold">Gift Course</h4>
            <p class="text-sm leading-[22px]"><span class="text-[#6E7485]">Home / Home / Complete Web...esign /</span>
                Gift Course</p>
        </section>

        <section class="py-[80px] flex flex-row gap-[136px] mx-[300px]">
            <div class="h-[1146px] w-[648px] space-y-[40px] bg-gray-50">
                <h4 class="text-[#1D2026] text-3xl leading-[40px] tracking-[-1%] font-semibold">Gift Course</h4>
                <div class="space-y-[24px]">
                    <h6 class="text-xl leading-[24px] font-medium text-[#1D2026]">Recipient's Information</h6>
                    <div class="space-y-[6px]">
                        <label class="block text-sm leading-[22px] tracking-[-1%] text-[#1D2026]">Recipient's
                            Name</label>
                        <input type="text" placeholder="Full name"
                            class="w-full border border-[#E9EAF0] px-4 py-3 bg-white outline-none">
                    </div>
                    <div class="space-y-[6px]">
                        <label class="block text-sm leading-[22px] tracking-[-1%] text-[#1D2026]">Recipient's
                            Email:</label>
                        <input type="text" placeholder="Email Address"
                            class="w-full border border-[#E9EAF0] px-4 py-3 bg-white outline-none">
                    </div>
                    <div class="space-y-[6px]">
                        <label class="block text-sm leading-[22px] tracking-[-1%] text-[#1D2026]">Gift Message</label>
                        <textarea rows="6" placeholder="Add your personal message here..."
                            class="w-full h-[112px] border border-[#E9EAF0] px-4 py-3 bg-white outline-none resize-none"></textarea>
                    </div>
                </div>
                <div class="space-y-[24px]">
                    <h6 class="text-xl leading-[24px] font-medium text-[#1D2026]">Payment Method</h6>
                    <div class="space-y-[16px]">
                        <div class="py-[10px] px-[24px] flex flex-row items-center justify-around bg-white border-[1px] border-[#E9EAF0]">
                            <img src="./gift_course-images/Visa.svg" alt="visa icon">
                            <p class="text-sm leading-[22px] tracking-[-1%] text-[#4E5566]">4855 **** **** ****</p>
                            <p class="text-sm leading-[22px] tracking-[-1%] text-[#4E5566]">04/24</p>
                            <p class="text-sm leading-[22px] tracking-[-1%] text-[#4E5566]">Vako Shvili</p>
                            <span class="w-[24px] h-[24px]"></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
